services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signal-nine-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/prod.db}
    ports:
      - "80:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:3000/api/health").then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
